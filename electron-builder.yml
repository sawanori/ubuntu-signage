appId: com.ubuntuapp.signage
productName: ubuntuapp
copyright: Copyright © 2026

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Utility
  maintainer: ubuntuapp

# arm64 prebuilt electron は electron@35.7.5 で対応済み
# ELECTRON_MIRROR / nativeModulesOptions は必要に応じて追加
